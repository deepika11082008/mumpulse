<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MomCare — Chatbot</title>
<link rel="stylesheet" href="style.css"/>
<style>
body {
  background:linear-gradient(160deg,#f7f0ff 0%,#fde8f0 55%,#e8f0fd 100%);
  min-height:100vh; display:flex; flex-direction:column; padding:0;
}

/* NAV */
.top-nav {
  background:rgba(255,255,255,0.75); backdrop-filter:blur(18px);
  border-bottom:1.5px solid rgba(201,184,232,0.35);
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 32px; flex-shrink:0;
}
.nav-brand { display:flex; align-items:center; gap:10px; }
.nav-brand .logo { font-size:1.6rem; }
.nav-brand h2 { font-size:1.2rem; color:var(--text-dark); letter-spacing:2px; }
.nav-back {
  padding:8px 18px; border-radius:10px; border:none;
  background:var(--blush); font-family:'Nunito',sans-serif;
  font-size:0.82rem; font-weight:800; color:var(--text-mid); cursor:pointer;
  letter-spacing:1px; text-transform:uppercase; transition:all 0.25s;
}
.nav-back:hover { background:var(--lavender-mid); color:white; }

/* CHAT LAYOUT */
.chat-wrap {
  flex:1; display:flex; flex-direction:column; max-width:800px;
  width:100%; margin:0 auto; padding:24px 20px 0;
}

/* BOT INTRO */
.bot-intro {
  background:rgba(255,255,255,0.8); backdrop-filter:blur(12px);
  border-radius:24px; padding:24px 28px; margin-bottom:20px;
  border:1.5px solid rgba(201,184,232,0.4);
  box-shadow:0 6px 20px var(--shadow); display:flex; gap:18px; align-items:center;
}
.bot-avatar {
  width:60px; height:60px; border-radius:50%;
  background:linear-gradient(135deg,var(--lavender-mid),var(--rose));
  display:flex; align-items:center; justify-content:center; font-size:1.8rem;
  box-shadow:0 4px 14px var(--shadow); flex-shrink:0;
  animation:float 3.5s ease-in-out infinite;
}
.bot-intro-text h3 { font-size:1.15rem; color:var(--text-dark); margin-bottom:4px; }
.bot-intro-text p { font-size:0.85rem; font-weight:700; color:var(--text-mid); line-height:1.6; }
.online-dot {
  width:10px; height:10px; border-radius:50%; background:#82c99a;
  display:inline-block; margin-right:6px; animation:pulseRing 2s infinite;
}

/* MESSAGES AREA */
.messages-area {
  flex:1; overflow-y:auto; padding-bottom:16px;
  display:flex; flex-direction:column; gap:16px;
  max-height:calc(100vh - 340px); min-height:300px;
}

/* MESSAGE BUBBLES */
.msg { display:flex; gap:10px; align-items:flex-end; }
.msg.user { flex-direction:row-reverse; }

.bubble-avatar {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:1.1rem;
}
.msg.bot .bubble-avatar { background:linear-gradient(135deg,var(--lavender-mid),var(--rose)); }
.msg.user .bubble-avatar { background:linear-gradient(135deg,var(--rose-deep),var(--lavender-deep)); }

.bubble {
  max-width:75%; padding:14px 18px; border-radius:20px;
  font-size:0.9rem; font-weight:700; line-height:1.6; position:relative;
}
.msg.bot .bubble {
  background:rgba(255,255,255,0.9); color:var(--text-dark);
  border:1.5px solid rgba(201,184,232,0.4);
  border-bottom-left-radius:4px;
  box-shadow:0 4px 12px var(--shadow);
}
.msg.user .bubble {
  background:linear-gradient(135deg,var(--lavender-deep),var(--rose-deep));
  color:white; border-bottom-right-radius:4px;
  box-shadow:0 4px 14px rgba(164,141,207,0.35);
}

.bubble-time {
  font-size:0.68rem; font-weight:600; opacity:0.6; margin-top:6px;
  display:block; text-align:right;
}
.msg.bot .bubble-time { text-align:left; color:var(--text-light); }

/* TYPING INDICATOR */
.typing-indicator { display:flex; gap:5px; align-items:center; padding:14px 18px; }
.typing-dot { width:8px; height:8px; border-radius:50%; background:var(--lavender-mid); animation:typingBounce 1s infinite; }
.typing-dot:nth-child(2) { animation-delay:0.15s; }
.typing-dot:nth-child(3) { animation-delay:0.3s; }
@keyframes typingBounce { 0%,80%,100%{transform:scale(0.8);opacity:0.5} 40%{transform:scale(1.2);opacity:1} }

/* QUICK REPLIES */
.quick-replies {
  display:flex; gap:10px; flex-wrap:wrap; padding:10px 0;
}
.qr-btn {
  padding:8px 16px; border-radius:50px; border:1.5px solid rgba(164,141,207,0.5);
  background:rgba(255,255,255,0.8); font-family:'Nunito',sans-serif;
  font-size:0.8rem; font-weight:800; color:var(--text-mid); cursor:pointer;
  transition:all 0.25s;
}
.qr-btn:hover { background:var(--lavender-deep); color:white; border-color:transparent; }

/* INPUT AREA */
.input-area {
  background:rgba(255,255,255,0.85); backdrop-filter:blur(16px);
  border-top:1.5px solid rgba(201,184,232,0.35);
  padding:16px 20px; margin:0 -20px;
  display:flex; gap:12px; align-items:center;
  position:sticky; bottom:0;
}
.chat-input {
  flex:1; padding:14px 20px; border-radius:50px;
  border:2px solid rgba(201,184,232,0.5); background:rgba(248,244,255,0.9);
  font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700;
  color:var(--text-dark); outline:none; transition:all 0.3s;
}
.chat-input:focus { border-color:var(--lavender-deep); background:white; box-shadow:0 0 0 4px rgba(164,141,207,0.1); }
.chat-input::placeholder { color:var(--text-light); }

.send-btn {
  width:50px; height:50px; border-radius:50%; border:none;
  background:linear-gradient(135deg,var(--lavender-deep),var(--rose-deep));
  color:white; font-size:1.2rem; cursor:pointer;
  box-shadow:0 4px 16px rgba(164,141,207,0.4); transition:all 0.3s;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.send-btn:hover { transform:scale(1.08); box-shadow:0 6px 20px rgba(164,141,207,0.5); }
.send-btn:disabled { opacity:0.5; cursor:not-allowed; }

#petals { position:fixed; inset:0; pointer-events:none; z-index:0; }
.chat-wrap, .top-nav { position:relative; z-index:1; }
</style>
</head>
<body>
<div id="petals"></div>

<nav class="top-nav">
  <div class="nav-brand">
    <span class="logo">🌸</span>
    <h2>MomCare Chatbot</h2>
  </div>
  <button class="nav-back" onclick="window.location.href='dashboard.html'">← Dashboard</button>
</nav>

<div class="chat-wrap">
  <!-- Bot intro -->
  <div class="bot-intro">
    <div class="bot-avatar">💜</div>
    <div class="bot-intro-text">
      <h3><span class="online-dot"></span>Mira — Your Postpartum Companion</h3>
      <p>Hello, mama 🌸 I'm here to listen, support, and gently guide you through this beautiful, challenging season. You can share anything with me.</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea"></div>

  <!-- Input -->
  <div class="input-area">
    <input class="chat-input" id="chatInput" placeholder="Share how you're feeling today, mama..." onkeydown="if(event.key==='Enter')sendMessage()"/>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// Petals
const petalColors=['#e0c8f5','#f5c6d0','#c8e0f5','#f5e0c8'];
const pc=document.getElementById('petals');
for(let i=0;i<12;i++){const p=document.createElement('div');p.className='petal';p.style.cssText=`left:${Math.random()*100}vw;background:${petalColors[Math.floor(Math.random()*petalColors.length)]};width:${8+Math.random()*8}px;height:${12+Math.random()*10}px;animation-duration:${7+Math.random()*9}s;animation-delay:${Math.random()*8}s;`;pc.appendChild(p);}

const name = localStorage.getItem('mom_name') || 'Mama';
const score = localStorage.getItem('q_score');
const messagesArea = document.getElementById('messagesArea');
let conversationHistory = [];
let isLoading = false;

// System prompt
const systemPrompt = `You are Mira, a warm, empathetic postpartum support companion for new mothers. You speak with gentleness, care, and deep understanding. 

The mother's name is ${name}. ${score ? `Her wellbeing questionnaire score was ${score}/15 (${parseInt(score)>=11?'Low':parseInt(score)>=6?'Moderate':'High'} risk).` : ''}

Guidelines:
- Always address her as ${name} or "mama" warmly
- Be supportive, never clinical or cold
- Validate her feelings without dismissing them
- Offer gentle practical tips when appropriate
- If she shows signs of serious distress, compassionately encourage professional support
- Keep responses conversational, warm, and not too long
- Use occasional soft emojis (💜 🌸 ✨) naturally
- Ask one follow-up question at the end of your responses to keep the conversation flowing
- NEVER give medical diagnoses or replace professional care`;

// Initial greeting
setTimeout(() => {
  addMessage('bot', `Hello ${name}! 🌸 I'm so glad you're here. How are you feeling today? Remember, there are no wrong answers — this is a safe space just for you. 💜`);
  showQuickReplies(['I\'m feeling tired', 'I feel anxious', 'I\'m doing okay', 'I\'m struggling today']);
}, 600);

function addMessage(role, text) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  msg.innerHTML = `
    <div class="bubble-avatar">${role==='bot'?'💜':'🤱'}</div>
    <div class="bubble">${text.replace(/\n/g,'<br>')}<span class="bubble-time">${time}</span></div>
  `;
  messagesArea.appendChild(msg);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showQuickReplies(options) {
  const qr = document.createElement('div');
  qr.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => { qr.remove(); sendMessageText(opt); };
    qr.appendChild(btn);
  });
  messagesArea.appendChild(qr);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'msg bot'; t.id = 'typingMsg';
  t.innerHTML = `<div class="bubble-avatar">💜</div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  messagesArea.appendChild(t);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  await sendMessageText(text);
}

async function sendMessageText(text) {
  if (isLoading) return;
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content && data.content[0] ? data.content[0].text : "I'm here with you, mama. Could you tell me a little more about how you're feeling? 💜";
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);

    // Context-aware quick replies
    const lower = text.toLowerCase();
    if (lower.includes('tired') || lower.includes('sleep')) {
      showQuickReplies(['Tips for rest?', 'My baby won\'t sleep', 'I feel exhausted all day']);
    } else if (lower.includes('anxi') || lower.includes('worry') || lower.includes('scare')) {
      showQuickReplies(['Tell me more', 'Breathing exercises?', 'I need professional help']);
    } else if (lower.includes('sad') || lower.includes('cry') || lower.includes('depress')) {
      showQuickReplies(['I feel alone', 'Support resources', 'I need to talk more']);
    } else if (lower.includes('baby')) {
      showQuickReplies(['Bonding tips?', 'I feel disconnected', 'My baby is doing great!']);
    }

  } catch (err) {
    removeTyping();
    addMessage('bot', `I'm here with you, ${name}. 💜 It seems there was a connection issue — please try again. Remember, I'm always here for you.`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
