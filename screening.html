<!DOCTYPE html>
<html>
<head>
<title>PPD Screening</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Daily Voice Check</h2>

<div class="days">

<button onclick="startDay(1)">Day 1 🎤</button>
<button onclick="startDay(2)">Day 2 🎤</button>
<button onclick="startDay(3)">Day 3 🎤</button>
<button onclick="startDay(4)">Day 4 🎤</button>
<button onclick="startDay(5)">Day 5 🎤</button>

</div>

<h3 id="question"></h3>

<button onclick="recordVoice()">🎤 Record Voice</button>

<hr>

<h2>Day 6 Questionnaire</h2>

<form id="questionnaire">

<label>How do you feel emotionally?</label>
<textarea id="q1"></textarea>

<label>Are you feeling stressed or overwhelmed?</label>
<textarea id="q2"></textarea>

<label>How is your sleep?</label>
<textarea id="q3"></textarea>

<label>Do you feel supported by family?</label>
<textarea id="q4"></textarea>

<label>How is your baby's health?</label>
<textarea id="q5"></textarea>

<button type="submit">Submit Screening</button>

</form>

<script src="script.js"></script>

</body>
</html>
